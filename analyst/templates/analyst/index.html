{% extends 'base.html' %} {% block content %}
<div class="p-8">
  <div class="mb-8">
    <form method="GET" class="flex gap-4">
      <input
        type="text"
        name="ticker"
        placeholder="Enter Ticker (e.g. NVDA)"
        class="bg-slate-700 p-2 rounded border border-slate-600 outline-none"
      />
      <button
        type="submit"
        class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500"
      >
        Analyze
      </button>
    </form>
  </div>

  {% if error %}
  <div class="bg-red-900/50 p-4 border border-red-500 rounded text-red-200">
    {{ error }}
  </div>
  {% else %}
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Col 1: Summary -->
    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
      <h2 class="text-xl font-bold mb-4">{{ ticker }} Overview</h2>
      <p class="text-3xl font-mono">${{ latest_price }}</p>
      <p class="text-slate-400">20-Day SMA: ${{ latest_sma }}</p>
    </div>

    <!-- Col 2: News -->
    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 col-span-2">
      <h2 class="text-xl font-bold mb-4">Latest News ({{ news_count }})</h2>
      <ul class="space-y-4">
        {% for article in news %}
        <li class="border-b border-slate-700 pb-2">
          <a
            href="{{ article.url }}"
            target="_blank"
            class="text-blue-400 hover:underline"
          >
            {{ article.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
  {% endif %}
</div>
{% endblock %}
