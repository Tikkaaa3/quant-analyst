{% extends 'base.html' %} {% block content %}
<div class="p-8">
  <div class="mb-8">
    <form hx-get="{% url 'run_analysis' %}" hx-target="#results-container" hx-indicator="#loading-spinner" class="flex gap-4">
      <input
        type="text"
        name="ticker"
        placeholder="Enter Ticker (e.g. NVDA)"
        class="bg-slate-700 p-2 rounded border border-slate-600 outline-none"
      />
      <button
        type="submit"
        class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500"
      >
        Analyze
      </button>
    </form>
  </div>

  <div id="loading-spinner" class="htmx-indicator mt-8 bg-slate-800 p-6 rounded-xl border border-slate-700"><p class="text-slate-300">Agent is crunching data... [Running Data Ingestion, XGBoost, PyTorch, LangGraph]</p></div>

  <div id="results-container" class="mt-8"></div>
</div>
{% endblock %}
